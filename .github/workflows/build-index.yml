name: Build Search Index

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    paths:
      - 'data/**.bin'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install @msgpack/msgpack
      
      - name: Build Index
        env:
          XOR_KEY: ${{ secrets.XOR_KEY }}
        run: node /scripts/build-index.js
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -f index/index.bin ]; then
            git add index/index.bin index/meta.json
            git commit -m "🔄 Auto-update search index [skip ci]" || echo "Нет изменений"
            git push
          else
            echo "❌ index/index.bin не создан, проверь скрипт build-index.js"
            exit 1
          fi
