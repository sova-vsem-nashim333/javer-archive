name: JAV Database Parser

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  parse:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install cloudscraper beautifulsoup4 lxml
          
      - name: Run parser
        env:
          XOR_KEY: ${{ secrets.XOR_KEY }}
        run: python parse_javdb.py
        timeout-minutes: 360
