name: JAV Database Parser

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Тестовый режим'
        type: boolean
        default: true

jobs:
  parse:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install cloudscraper beautifulsoup4 lxml
          
      - name: Run parser
        env:
          XOR_KEY: ${{ secrets.XOR_KEY }}
          TEST_MODE: '${{ github.event.inputs.test_mode || ''true'' }}'
        run: python parse_javdb.py
        timeout-minutes: 360
          
      - name: Upload test results
        if: github.event.inputs.test_mode == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            data/*.json
            metadata.json
          retention-days: 7
          
      - name: Commit and push
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add data/*.bin metadata.json sitemap_cache.json
          git diff --staged --quiet || (git commit -m "Update $(date +'%Y-%m-%d')" && git push)
