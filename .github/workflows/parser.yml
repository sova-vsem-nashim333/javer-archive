name: JAV Database Parser

on:
  schedule:
    # Запуск каждый день в 0:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Позволяет запускать вручную

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run parser
        run: python parse_javdb.py

      - name: Commit and push results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add parsed_films.json sitemap_cache.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update film data $(date +'%Y-%m-%d')" && git push)
