name: JAV Database Parser

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Тестовый режим'
        type: boolean
        default: true

jobs:
  parse:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install cloudscraper beautifulsoup4 lxml
          
      - name: Run parser
        env:
          XOR_KEY: ${{ secrets.XOR_KEY }}
          TEST_MODE: '${{ github.event.inputs.test_mode || github.event_name == ''workflow_dispatch'' && ''true'' || ''false'' }}'
        run: python parse_javdb.py
        timeout-minutes: 360
        
      - name: Upload results (test)
        if: github.event.inputs.test_mode == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: parsed_films.json
          
      - name: Commit (production)
        if: github.event.inputs.test_mode != 'true'
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add parsed_films.enc sitemap_cache.json
          git diff --staged --quiet || (git commit -m "Update $(date +'%Y-%m-%d')" && git push)
